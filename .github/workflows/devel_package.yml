name: Publish devel container images

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches:
      - devel

jobs:
  # ── Hub image ──────────────────────────────────────────────────────────────

  hub-ghcr-io:
    name: Hub → ghcr.io
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/ws2m-hub
          labels: |
            org.opencontainers.image.title=WyzeSense2MQTT Hub
            org.opencontainers.image.description=Hub process for WyzeSense2MQTT — runs the full sensor protocol and publishes to MQTT/Home Assistant

      - name: Log into registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.hub
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Remote image ───────────────────────────────────────────────────────────

  remote-ghcr-io:
    name: Remote → ghcr.io
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/ws2m-remote
          labels: |
            org.opencontainers.image.title=WyzeSense2MQTT Remote
            org.opencontainers.image.description=Remote bridge for WyzeSense2MQTT — relays raw HID frames from a USB dongle to the hub over WebSocket

      - name: Log into registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.remote
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Post-publish notification ──────────────────────────────────────────────

  notify-ha-apps:
    name: Notify HA Apps repo
    needs: [hub-ghcr-io, remote-ghcr-io]
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Extract version from config.py
        id: version
        run: |
          VERSION=$(grep '^VERSION' hub/config.py | sed 's/.*"\(.*\)"/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Dispatch sync to home-assistant-apps
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HA_APPS_PAT }}
          repository: raetha/home-assistant-apps
          event-type: ws2m-devel
          client-payload: '{"version": "${{ steps.version.outputs.version }}"}'
