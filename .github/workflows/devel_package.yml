# Devel branch CI + publish pipeline.
#
# Runs entirely from the devel branch so that changes to this file take effect
# immediately without requiring a sync to main.  The publish jobs depend on all
# three CI jobs passing — same gate as the main branch CI, no workflow_run needed.

name: Devel CI + publish

on:
  push:
    branches: ["devel"]
  pull_request:
    branches: ["devel"]

jobs:
  # ── Lint with ruff ──────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff check
        run: ruff check hub/ remote/ tests/
      - name: Run ruff format check
        run: ruff format --check hub/ remote/ tests/

  # ── Verify dependencies install and the app imports cleanly ────────────────
  build:
    name: Install & import check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r hub/requirements.txt -r remote/requirements.txt
      - name: Byte-compile and syntax-check sources
        run: |
          python -m compileall -q hub/
          python -m compileall -q remote/

  # ── Test suite ──────────────────────────────────────────────────────────────
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r hub/requirements.txt -r remote/requirements.txt
          pip install pytest
      - name: Run test suite
        run: pytest

  # ── Hub image ───────────────────────────────────────────────────────────────
  hub-ghcr-io:
    name: Hub → ghcr.io
    needs: [lint, build, test]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/ws2m-hub
          labels: |
            org.opencontainers.image.title=WyzeSense2MQTT Hub
            org.opencontainers.image.description=Hub process for WyzeSense2MQTT — runs the full sensor protocol and publishes to MQTT/Home Assistant

      - name: Log into registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.hub
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Remote image ────────────────────────────────────────────────────────────
  remote-ghcr-io:
    name: Remote → ghcr.io
    needs: [lint, build, test]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/ws2m-remote
          labels: |
            org.opencontainers.image.title=WyzeSense2MQTT Remote
            org.opencontainers.image.description=Remote bridge for WyzeSense2MQTT — relays raw HID frames from a USB dongle to the hub over WebSocket

      - name: Log into registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.remote
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Post-publish notification ────────────────────────────────────────────────
  notify-ha-apps:
    name: Notify HA Apps repo
    needs: [hub-ghcr-io, remote-ghcr-io]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Extract version from config.py
        id: version
        run: |
          VERSION=$(grep '^VERSION' hub/config.py | sed 's/.*"\(.*\)"/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Dispatch sync to home-assistant-apps
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HA_APPS_PAT }}
          repository: raetha/home-assistant-apps
          event-type: ws2m-devel
          client-payload: '{"version": "${{ steps.version.outputs.version }}"}'
