name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7

      - name: Build release packages
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          # Hub package: hub/ code + example service file
          mkdir -p /tmp/ws2m-hub-pkg
          cp -r hub/. /tmp/ws2m-hub-pkg/
          cp examples/hub/ws2m-hub.service.example /tmp/ws2m-hub-pkg/
          tar -czf "ws2m-hub-${VERSION}.tar.gz" -C /tmp/ws2m-hub-pkg .

          # Remote package: remote/ code + example service file
          mkdir -p /tmp/ws2m-remote-pkg
          cp -r remote/. /tmp/ws2m-remote-pkg/
          cp examples/remote/ws2m-remote.service.example /tmp/ws2m-remote-pkg/
          tar -czf "ws2m-remote-${VERSION}.tar.gz" -C /tmp/ws2m-remote-pkg .

      - name: Extract changelog for this release
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk "/^## \[?$VERSION\]?/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See CHANGELOG.md for details."
          fi
          echo "$NOTES" > /tmp/release_notes.md
          echo "notes_file=/tmp/release_notes.md" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: "WyzeSense2MQTT ${{ github.ref_name }}"
          body_path: ${{ steps.changelog.outputs.notes_file }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            ws2m-hub-*.tar.gz
            ws2m-remote-*.tar.gz

  # ── Hub image ──────────────────────────────────────────────────────────────

  hub-ghcr-io:
    name: Hub → ghcr.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/ws2m-hub
          labels: |
            org.opencontainers.image.title=WyzeSense2MQTT Hub
            org.opencontainers.image.description=Hub process for WyzeSense2MQTT — runs the full sensor protocol and publishes to MQTT/Home Assistant

      - name: Log into registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.hub
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Remote image ───────────────────────────────────────────────────────────

  remote-ghcr-io:
    name: Remote → ghcr.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/ws2m-remote
          labels: |
            org.opencontainers.image.title=WyzeSense2MQTT Remote
            org.opencontainers.image.description=Remote bridge for WyzeSense2MQTT — relays raw HID frames from a USB dongle to the hub over WebSocket

      - name: Log into registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.remote
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Post-release notification ──────────────────────────────────────────────

  notify-ha-apps:
    name: Notify HA Apps repo
    needs: [hub-ghcr-io, remote-ghcr-io]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Dispatch sync to home-assistant-apps
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HA_APPS_PAT }}
          repository: raetha/home-assistant-apps
          event-type: ws2m-release
          client-payload: '{"version": "${{ steps.version.outputs.version }}"}'
