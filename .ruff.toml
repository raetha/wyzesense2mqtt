target-version = "py313"
# Common middle-ground line length (wider than the black/ruff default of 88,
# narrower than the previous flake8 setting of 200).
line-length = 120

[lint]
select = [
    "E",      # pycodestyle errors
    "F",      # pyflakes
    "I",      # isort
    "W",      # pycodestyle warnings
    "B",      # flake8-bugbear
    "UP",     # pyupgrade
    "FURB",   # refurb
]
